<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Verifica si tu billete de la Serie B de Bolivia está inhabilitado">
    <meta name="theme-color" content="#1a237e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Verificador">
    
    <title>Verificador de Billetes Serie B - Bolivia</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>Verificador de Billetes</h1>
            <p class="subtitle">Serie B - Bolivia</p>
        </header>

        <section class="camera-section">
            <div class="camera-container" id="camera-container">
                <video id="camera-preview" autoplay playsinline muted></video>
                <canvas id="capture-canvas" style="display: none;"></canvas>
                <div class="camera-status" id="camera-status">
                    <span class="camera-status-icon">📷</span>
                    <span class="camera-status-text">Iniciando cámara...</span>
                    <button class="camera-retry" id="btn-retry-camera" style="display: none;">Reintentar</button>
                </div>
                <div class="scan-overlay">
                    <div class="scan-guide">
                        <p>Alinea el número de serie aquí</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="action-buttons">
            <button class="btn btn-scan" id="btn-capture">
                <span class="btn-icon">📷</span>
                <span>Escanear</span>
            </button>
            <button class="btn btn-flash" id="btn-flash">
                <span class="flash-icon">🔦</span>
            </button>
        </section>

        <section class="denomination-section" id="denomination-section">
            <div class="denomination-selector" id="denomination-selector">
                <button class="btn btn-denomination" data-value="10">
                    <span class="btn-amount">Bs 10</span>
                </button>
                <button class="btn btn-denomination" data-value="20">
                    <span class="btn-amount">Bs 20</span>
                </button>
                <button class="btn btn-denomination" data-value="50">
                    <span class="btn-amount">Bs 50</span>
                </button>
            </div>
            
            <div class="results-container" id="results-container" style="display: none;">
                <div class="result-card" data-denomination="10">
                    <span class="result-denomination">Bs 10</span>
                    <span class="result-status"></span>
                </div>
                <div class="result-card" data-denomination="20">
                    <span class="result-denomination">Bs 20</span>
                    <span class="result-status"></span>
                </div>
                <div class="result-card" data-denomination="50">
                    <span class="result-denomination">Bs 50</span>
                    <span class="result-status"></span>
                </div>
            </div>
        </section>

        <section class="manual-entry">
            <p class="divider-text">— o ingresa manualmente —</p>
            <div class="input-group">
                <input type="text" id="manual-input" placeholder="Número de serie" inputmode="numeric" pattern="[0-9]*" maxlength="9">
                <button class="btn btn-secondary" id="btn-verify-manual">Verificar</button>
            </div>
        </section>

        <button class="btn btn-primary btn-reset" id="btn-reset" style="display: none;">
            Nuevo escaneo
        </button>

        <div class="serial-display" id="serial-display" style="display: none;">
            <span class="serial-label">Número detectado:</span>
            <span class="serial-number" id="serial-number"></span>
        </div>

        <div class="loading-overlay" id="loading-overlay">
            <div class="spinner"></div>
            <p>Procesando...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
